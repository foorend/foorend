name: Update RSS Feeds

on:
  schedule:
    - cron: '0 */3 * * *'   # 3시간마다 실행
  workflow_dispatch:          # 수동 실행 가능

permissions:
  contents: write

jobs:
  update-feeds:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch RSS feeds
        run: python3 .github/scripts/fetch_feeds.py

      - name: Commit updated feeds.json
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add feeds.json
          git diff --staged --quiet || git commit -m "chore: update RSS feeds [skip ci]"
          git push
